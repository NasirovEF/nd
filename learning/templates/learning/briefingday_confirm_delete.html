{% extends 'organization/base.html' %}
{% block content %}
<form method="post">
    <div class="row">
        <div class="col-4">
        </div>
        <div class="col-4">
            <div class="card text-center m-4">
                <div class="card-header">
                    Подтверждение удаления
                </div>
                <div class="card-body">
                    {% csrf_token %}
                    Вы действительно хотите удалить инструктаж <br> <strong>{{ object.text }}</strong> ?
                </div>
                <div class="card-footer">
                    {% if is_archive %}
                    <a href="{% url 'learning:briefing_day_list' object.learner.worker.pk %}" class="btn btn-outline-primary">
                        Отмена
                    </a>
                    {% else %}
                    <a href="{% url 'organization:worker_detail' object.learner.worker.pk %}" class="btn btn-outline-primary">
                        Отмена
                    </a>
                    {% endif %}
                    <button type="submit" class="btn btn-outline-danger">
                        Подтвердить
                    </button>
                </div>
            </div>
        </div>
        <div class="col-4">
        </div>
    </div>
</form>
{% endblock %}
