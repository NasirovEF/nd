<!doctype html>
{% load static %}
<html lang="en" data-bs-theme="auto">
<head>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/bootstrap-icons.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap-select.min.css' %}">
    <script src="{% static 'js/color-modes.js' %}"></script>
    <title>Система обучения и инструктажа</title>
</head>

<body>
    {% include 'organization/include/inc_menu.html' %}
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer class="text-body-secondary py-5">
        <div class="container">
            <p class="float-end mb-1">
                <a href="{% url 'organization:organization_list' %}">На главную</a>
            </p>
            <p class="mb-1"></p>
            <p class="mb-0"></p>
        </div>
    </footer>

    <!-- Подключение библиотек (в правильном порядке) -->
    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}" crossorigin="anonymous"></script>
    <script src="{% static 'js/bootstrap-select.min.js' %}"></script>


    <!-- Инициализация скриптов -->
    {% block scripts %}
    <script>
        $(document).ready(function() {
            $('.selectpicker').selectpicker({
                noneSelectedText: 'Выберите...',
                countSelectedText: 'Выбрано ${0} из ${1}',  // Например: «Выбрано 2 из 5»
                actionsBox: true,  // Кнопки «Выбрать всё» / «Снять всё»
                liveSearch: true,
                liveSearchPlaceholder: 'Поиск...',
                title: 'Выберите...'  // Текст-заполнитель
            });
        });
    </script>
    {% endblock %}
</body>
</html>
